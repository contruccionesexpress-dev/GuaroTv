kind = "web"
previewPath = "/"
title = "El Guaro TV"
version = "1.0.0"
id = "artifacts/el-guaro-tv"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26022

[services.development]
run = "pnpm --filter @workspace/el-guaro-tv run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/el-guaro-tv", "run", "build" ]
publicDir = "artifacts/el-guaro-tv/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26022"
BASE_PATH = "/"
